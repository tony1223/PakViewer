name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 觸發條件：推送 v 開頭的 tag，例如 v1.26.0

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_NAME: PakViewer

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "TAG=$TAG" >> $GITHUB_OUTPUT

        # 解析版本號，將時間戳分割成符合 .NET 格式
        # 例如: v1.26.01122103 -> 1.26.112.2103 (MAJOR.YEAR.MMDD.HHMM)
        if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]{8})$ ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          YEAR="${BASH_REMATCH[2]}"
          TIMESTAMP="${BASH_REMATCH[3]}"
          MMDD="${TIMESTAMP:0:4}"
          HHMM="${TIMESTAMP:4:4}"
          # 移除前導零以避免八進制解析問題
          MMDD=$((10#$MMDD))
          HHMM=$((10#$HHMM))
          DOTNET_VERSION="${MAJOR}.${YEAR}.${MMDD}.${HHMM}"
        else
          # 如果不是時間戳格式，直接使用原版本號
          DOTNET_VERSION="$VERSION"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "DOTNET_VERSION=$DOTNET_VERSION" >> $GITHUB_OUTPUT

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore PakViewer.csproj -r win-x64

    - name: Build Self-Contained
      run: |
        dotnet publish PakViewer.csproj -f net10.0-windows --configuration Release --runtime win-x64 --self-contained true --no-restore -o publish-sc /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Build Framework-Dependent
      run: |
        dotnet publish PakViewer.csproj -f net10.0-windows --configuration Release --self-contained false -o publish-fd /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Create ZIP archives
      shell: pwsh
      run: |
        Compress-Archive -Path "publish-sc/*" -DestinationPath "${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-win-x64-self-contained.zip"
        Compress-Archive -Path "publish-fd/*" -DestinationPath "${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-win-x64.zip"

    - name: Upload self-contained artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-win-x64-self-contained
        path: ${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-win-x64-self-contained.zip

    - name: Upload framework-dependent artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-win-x64
        path: ${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-win-x64.zip

    # CLI Build
    - name: Restore CLI dependencies
      run: dotnet restore src/PakViewer.Cli/PakViewer.Cli.csproj -r win-x64

    - name: Build CLI (Self-Contained)
      run: |
        dotnet publish src/PakViewer.Cli/PakViewer.Cli.csproj -f net10.0 --configuration Release --runtime win-x64 --self-contained true --no-restore -o publish-cli /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Create CLI ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path "publish-cli/*" -DestinationPath "pakviewer-cli-${{ steps.get_version.outputs.TAG }}-win-x64.zip"

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: pakviewer-cli-win-x64
        path: pakviewer-cli-${{ steps.get_version.outputs.TAG }}-win-x64.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "TAG=$TAG" >> $GITHUB_OUTPUT

        # 解析版本號，將時間戳分割成符合 .NET 格式
        # 例如: v1.26.01122103 -> 1.26.112.2103 (MAJOR.YEAR.MMDD.HHMM)
        if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]{8})$ ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          YEAR="${BASH_REMATCH[2]}"
          TIMESTAMP="${BASH_REMATCH[3]}"
          MMDD="${TIMESTAMP:0:4}"
          HHMM="${TIMESTAMP:4:4}"
          # 移除前導零以避免八進制解析問題
          MMDD=$((10#$MMDD))
          HHMM=$((10#$HHMM))
          DOTNET_VERSION="${MAJOR}.${YEAR}.${MMDD}.${HHMM}"
        else
          # 如果不是時間戳格式，直接使用原版本號
          DOTNET_VERSION="$VERSION"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "DOTNET_VERSION=$DOTNET_VERSION" >> $GITHUB_OUTPUT

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore PakViewer.csproj -r linux-x64

    - name: Build and Publish
      run: |
        dotnet publish PakViewer.csproj -f net10.0 --configuration Release --runtime linux-x64 --self-contained true --no-restore -o publish /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Create ZIP archive
      run: |
        cd publish
        chmod +x ${{ env.PROJECT_NAME }}* 2>/dev/null || true
        zip -r "../${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-linux-x64.zip" .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-linux-x64
        path: ${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-linux-x64.zip

    # CLI Build
    - name: Build CLI
      run: |
        dotnet publish src/PakViewer.Cli/PakViewer.Cli.csproj -f net10.0 --configuration Release --runtime linux-x64 --self-contained true -o publish-cli /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Create CLI ZIP
      run: |
        cd publish-cli
        chmod +x pakviewer-cli* 2>/dev/null || true
        zip -r "../pakviewer-cli-${{ steps.get_version.outputs.TAG }}-linux-x64.zip" .

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: pakviewer-cli-linux-x64
        path: pakviewer-cli-${{ steps.get_version.outputs.TAG }}-linux-x64.zip

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "TAG=$TAG" >> $GITHUB_OUTPUT

        # 解析版本號，將時間戳分割成符合 .NET 格式
        # 例如: v1.26.01122103 -> 1.26.112.2103 (MAJOR.YEAR.MMDD.HHMM)
        if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]{8})$ ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          YEAR="${BASH_REMATCH[2]}"
          TIMESTAMP="${BASH_REMATCH[3]}"
          MMDD="${TIMESTAMP:0:4}"
          HHMM="${TIMESTAMP:4:4}"
          # 移除前導零以避免八進制解析問題
          MMDD=$((10#$MMDD))
          HHMM=$((10#$HHMM))
          DOTNET_VERSION="${MAJOR}.${YEAR}.${MMDD}.${HHMM}"
        else
          # 如果不是時間戳格式，直接使用原版本號
          DOTNET_VERSION="$VERSION"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "DOTNET_VERSION=$DOTNET_VERSION" >> $GITHUB_OUTPUT

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Import Code Signing Certificate
      env:
        CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
        security create-keychain -p actions build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p actions build.keychain
        security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
        rm certificate.p12

    - name: Restore dependencies
      run: |
        dotnet restore PakViewer.csproj -r osx-x64
        dotnet restore PakViewer.csproj -r osx-arm64

    - name: Build x64
      run: |
        # 關閉 R2R 讓 managed DLL 架構無關，以便建立 universal binary
        dotnet publish PakViewer.csproj -f net10.0 --configuration Release --runtime osx-x64 --self-contained true -o publish-x64 /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }} /p:PublishReadyToRun=false

    - name: Build arm64
      run: |
        dotnet publish PakViewer.csproj -f net10.0 --configuration Release --runtime osx-arm64 --self-contained true -o publish-arm64 /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }} /p:PublishReadyToRun=false

    - name: Create Universal Binary DMG
      run: |
        APP_NAME="${{ env.PROJECT_NAME }}.app"
        UNIVERSAL_APP="universal/$APP_NAME"

        # 複製 arm64 版本作為基礎
        mkdir -p universal
        cp -R "publish-arm64/$APP_NAME" "$UNIVERSAL_APP"

        # 使用 lipo 合併所有 Mach-O 檔案 (執行檔和 dylib)
        MACOS_DIR="$UNIVERSAL_APP/Contents/MacOS"
        for file in "$MACOS_DIR"/*; do
          filename=$(basename "$file")
          x64_file="publish-x64/$APP_NAME/Contents/MacOS/$filename"
          if [ -f "$x64_file" ] && file "$file" | grep -q "Mach-O"; then
            echo "Creating universal binary for $filename"
            lipo -create "$file" "$x64_file" -output "$MACOS_DIR/$filename.universal"
            mv "$MACOS_DIR/$filename.universal" "$MACOS_DIR/$filename"
          fi
        done

        # Developer ID 簽署 + hardened runtime
        IDENTITY="TonyQ CO., LTD. (8JVDJGLLYR)"
        for dylib in "$MACOS_DIR"/*.dylib; do
          [ -f "$dylib" ] && codesign --force --options runtime --sign "$IDENTITY" "$dylib" 2>/dev/null || true
        done
        codesign --force --deep --options runtime --sign "$IDENTITY" "$UNIVERSAL_APP"

        # 建立 DMG
        hdiutil create -volname "${{ env.PROJECT_NAME }}" -srcfolder "$UNIVERSAL_APP" -ov -format UDZO "${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-osx-universal.dmg"

    - name: Notarize DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        DMG_FILE="${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-osx-universal.dmg"
        echo "Submitting $DMG_FILE for notarization..."
        xcrun notarytool submit "$DMG_FILE" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --timeout 30m
        echo "Stapling notarization ticket..."
        xcrun stapler staple "$DMG_FILE"

    - name: Upload universal artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-osx-universal
        path: ${{ env.PROJECT_NAME }}-${{ steps.get_version.outputs.TAG }}-osx-universal.dmg

    # CLI Build (arm64 only)
    - name: Build CLI
      run: |
        dotnet publish src/PakViewer.Cli/PakViewer.Cli.csproj -f net10.0 --configuration Release --runtime osx-arm64 --self-contained true -o publish-cli /p:PublishSingleFile=true /p:Version=${{ steps.get_version.outputs.DOTNET_VERSION }}

    - name: Create CLI ZIP
      run: |
        cd publish-cli
        chmod +x pakviewer-cli* 2>/dev/null || true
        zip -r "../pakviewer-cli-${{ steps.get_version.outputs.TAG }}-osx-arm64.zip" .

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: pakviewer-cli-osx-arm64
        path: pakviewer-cli-${{ steps.get_version.outputs.TAG }}-osx-arm64.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "TAG=$TAG" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f \( -name "*.zip" -o -name "*.dmg" \)

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.PROJECT_NAME }} ${{ steps.get_version.outputs.TAG }}
        body: |
          ## ${{ env.PROJECT_NAME }} ${{ steps.get_version.outputs.TAG }}

          ### Downloads

          #### GUI (PakViewer)

          | Platform | File | Note |
          |----------|------|------|
          | Windows x64 | `PakViewer-*-win-x64.zip` | 需安裝 [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0) |
          | Windows x64 | `PakViewer-*-win-x64-self-contained.zip` | 包含 .NET Runtime，可直接執行 |
          | Linux x64 | `PakViewer-*-linux-x64.zip` | Self-contained |
          | macOS Universal | `PakViewer-*-osx-universal.dmg` | Self-contained, 支援 Intel & Apple Silicon |

          #### CLI (pakviewer-cli)

          | Platform | File | Note |
          |----------|------|------|
          | Windows x64 | `pakviewer-cli-*-win-x64.zip` | Self-contained |
          | Linux x64 | `pakviewer-cli-*-linux-x64.zip` | Self-contained |
          | macOS arm64 | `pakviewer-cli-*-osx-arm64.zip` | Self-contained (Apple Silicon) |

          ### macOS / Linux 使用說明

          **macOS**:
          1. 下載 DMG 檔案並雙擊掛載
          2. 將 PakViewer.app 拖曳到應用程式資料夾
          3. 雙擊即可開啟（已完成 Apple 公證）

          **Linux**:
          ```bash
          # 解壓縮後，給予執行權限
          chmod +x PakViewer
          ./PakViewer
          ```

          ### Changes
          See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.get_version.outputs.TAG }}) for details.
        files: |
          artifacts/**/*.zip
          artifacts/**/*.dmg
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.TAG, '-') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Discord Channel
      if: success()
      run: |
        curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🎉 **PakViewer ${{ steps.get_version.outputs.TAG }}** 已發布！\n\n下載: <https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.TAG }}>\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

    - name: Notify Discord Thread
      if: success()
      env:
        DISCORD_THREAD_URL: ${{ secrets.DISCORD_WEBHOOK_THREAD_URL }}
      run: |
        if [ -n "$DISCORD_THREAD_URL" ]; then
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"🎉 **PakViewer ${{ steps.get_version.outputs.TAG }}** 已發布！\n\n下載: <https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.TAG }}>\"}" \
            "$DISCORD_THREAD_URL"
        fi
